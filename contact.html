<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact – Widad</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope&family=Montserrat:wght@700&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <nav>
      <a href="index.html" class="lien-icone">
        <img src="Logo.png" alt="Logo Widad">
      </a>
      <div>
        <a href="index.html">Accueil</a>
        <a href="a-propos.html">À propos</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
  </header>

  <main class="contact-section">
    <section>
      <h2>Discutons ensemble</h2>
      <p>N'hésitez pas à me contacter pour une alternance, une collaboration ou toute autre opportunité !</p>

      <div class="contact-infos">
        <p><strong>Téléphone :</strong> <a href="tel:0651126440">06 51 12 64 40</a></p>
        <p><strong>Email :</strong> <a href="mailto:ghemit.widad@gmail.com">ghemit.widad@gmail.com</a></p>
        <p><strong>LinkedIn :</strong> <a href="https://www.linkedin.com/in/widadghemit" target="_blank" rel="noopener noreferrer">widadghemit</a></p>
      </div>

      <form id="contactForm" action="https://formspree.io/f/mnnvjynr" method="POST" class="form-contact">
        <label for="name">Nom :</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email :</label>
        <input type="email" id="email" name="email" required>

        <label for="subject">Objet :</label>
        <input type="text" id="subject" name="subject" required>

        <label for="message">Message :</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit" class="cta">Envoyer</button>
        <p id="formStatus" class="form-status"></p>
      </form>
    </section>
  </main>

  <footer>
    <p>© Widad – Tous droits réservés</p>
  </footer>

  <script>
    const form = document.getElementById('contactForm');
    const status = document.getElementById('formStatus');

    form.addEventListener('submit', async function(event) {
      event.preventDefault();
      status.textContent = 'Envoi en cours...';

      const formData = new FormData(form);
      try {
        const response = await fetch(form.action, {
          method: 'POST',
          body: formData,
          headers: {
            'Accept': 'application/json'
          }
        });

        if (response.ok) {
          status.textContent = 'Merci ! Votre message a bien été envoyé.';
          form.reset();
        } else {
          status.textContent = "Oups ! Une erreur s'est produite.";
        }
      } catch (error) {
        status.textContent = "Une erreur réseau s’est produite. Réessayez plus tard.";
      }
    });
  </script>

</body>
</html>
