<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – Widad</title>
  <link rel="stylesheet" href="style.css">

  <!-- Icônes Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <header>
    <h1>Contact</h1>
    <nav>
      <ul>
        <li><a href="index.html">Accueil</a></li>
        <li><a href="portfolio.html">Portfolio</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="contact">
      <h2>Me contacter</h2>
      <p>Pour toute question, projet ou opportunité, n'hésitez pas à me contacter via les informations ci-dessous :</p>
      
      <div class="contact-infos">
        <p><i class="fas fa-phone"></i> 06 12 34 56 78</p>
        <p><i class="fas fa-envelope"></i> <a href="mailto:ghemit.widad@gmail.com">ghemit.widad@gmail.com</a></p>
        <p><i class="fab fa-linkedin"></i> 
          <a href="https://www.linkedin.com/in/widad-ghemit" target="_blank">
            linkedin.com/in/widad-ghemit
          </a>
        </p>
      </div>

      <form action="#" method="post" class="contact-form">
        <label for="nom">Nom :</label>
        <input type="text" id="nom" name="nom" required>

        <label for="email">Email :</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message :</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit">Envoyer</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Widad Ghemit. Tous droits réservés.</p>
  </footer>

</body>
</html>
