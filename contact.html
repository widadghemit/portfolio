<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Portfolio Widad</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <h1>Contactez-moi</h1>

  <form id="contact-form" action="https://formspree.io/f/your-form-id" method="POST">
    <input type="text" name="name" placeholder="Votre nom" required />
    <input type="email" name="email" placeholder="Votre email" required />
    <textarea name="message" placeholder="Votre message" rows="6" required></textarea>
    <button type="submit">Envoyer</button>
    <div id="status"></div>
  </form>

  <div class="flying-envelope">✉️</div>

  <script>
    const form = document.getElementById('contact-form');
    const status = document.getElementById('status');

    function showFlyingEnvelope() {
      const envelope = document.querySelector('.flying-envelope');
      envelope.classList.add('animate');
      setTimeout(() => {
        envelope.classList.remove('animate');
      }, 1500);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData(form);
      const response = await fetch(form.action, {
        method: form.method,
        body: formData,
        headers: {
          'Accept': 'application/json'
        }
      });

      if (response.ok) {
        showFlyingEnvelope();
        status.textContent = 'Merci ! Votre message a bien été envoyé.';
        status.classList.add('visible');
        form.reset();
      } else {
        status.textContent = 'Oups ! Une erreur est survenue.';
        status.classList.add('visible');
      }

      setTimeout(() => {
        status.classList.remove('visible');
      }, 4000);
    });
  </script>

</body>
</html>
