  <link rel="stylesheet" href="style.css" />

<body>

  <header>
    <h1>Contact</h1>
    <nav>

      <a href="portfolio.html">Portfolio</a>

  <main class="contact-section">
    <section>
      <h2>Discutons ensemble</h2>
      <p>N'hésitez pas à me contacter pour une alternance, une collaboration ou toute autre opportunité !</p>

      <div class="contact-infos">
        <p><strong>Téléphone :</strong> <a href="tel:0651126440">06 51 12 64 40</a></p>
        <p><strong>Email :</strong> <a href="mailto:ghemit.widad@gmail.com">ghemit.widad@gmail.com</a></p>
      </div>

      <form action="mailto:ghemit.widad@gmail.com" method="POST" enctype="text/plain" class="form-contact">
        <label for="name">Nom :</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email :</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message :</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit" class="cta">Envoyer</button>
      </form>
    </section>
  </main>

  <footer>
    <p>© Widad – Tous droits réservés</p>
  </footer>
