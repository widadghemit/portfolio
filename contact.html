<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – Widad</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-contact">
  <header>
    <nav>
      <a href="index.html">Accueil</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <main class="contact-section">
    <div class="contact-card">
      <h1>Envie de discuter ?</h1>
      <p class="intro-contact">
        Je suis ravie d’échanger avec vous ! Que ce soit pour une opportunité,
        une collaboration ou simplement pour dire bonjour, n’hésitez pas à
        m’écrire.
      </p>

      <div class="contact-infos">
        <p>📞 <a href="tel:+33651126440">06 51 12 64 40</a></p>
        <p>📧 <a href="mailto:ghemit.widad@gmail.com">ghemit.widad@gmail.com</a></p>
        <p>🔗 <a href="https://www.linkedin.com/in/widadghemit" target="_blank" rel="noopener noreferrer">Mon profil LinkedIn</a></p>
      </div>

      <form class="form-contact" onsubmit="showConfirmation(event)" aria-label="Formulaire de contact">
        <label for="nom">Nom</label>
        <input type="text" id="nom" name="nom" required />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit" class="cta">Envoyer</button>
        <div id="status" role="alert" aria-live="polite"></div>
      </form>
    </div>

    <div class="flying-envelope" aria-hidden="true">✉️</div>
  </main>

  <footer>
    <p>© 2025 Widad Ghemit</p>
  </footer>

  <script>
    function showConfirmation(event) {
      event.preventDefault();
      document.getElementById('status').textContent = "Merci pour votre message ! Je vous répondrai rapidement.";
    }
  </script>
</body>
</html>
