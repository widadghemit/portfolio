<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="styles.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Manrope&family=Montserrat:wght@700&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <h1>Contact</h1>
    <nav>
      <a href="index.html">Accueil</a>
      <a href="portfolio.html">Portfolio</a>
    </nav>
  </header>

  <main class="contact-section">
    <h2>Envie de collaborer ?</h2>
    <p>Remplis ce formulaire et je te répondrai dès que possible.</p>

    <section>
      <form class="form-contact" action="#" method="POST" onsubmit="handleFormSubmit(event)">
        <label for="name">Nom</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit" class="cta">Envoyer</button>
      </form>

      <div id="status">Message envoyé avec succès !</div>
      <div class="flying-envelope" id="envelope">✉️</div>
    </section>
  </main>

  <footer>
    <p>© 2025 Widad</p>
    <div>
      <a href="#" class="lien-icone">Instagram</a>
      <a href="#" class="lien-icone">LinkedIn</a>
    </div>
  </footer>

  <script>
    function handleFormSubmit(e) {
      e.preventDefault();

      const envelope = document.getElementById('envelope');
      const status = document.getElementById('status');

      // Déclenche l'animation
      envelope.classList.add('animate');
      status.classList.add('visible');

      // Réinitialise l'animation pour pouvoir la rejouer
      setTimeout(() => {
        envelope.classList.remove('animate');
      }, 1500);

      // Masquer le message après 4 secondes
      setTimeout(() => {
        status.classList.remove('visible');
      }, 4000);

      // Réinitialiser le formulaire (facultatif)
      e.target.reset();
    }
  </script>

</body>
</html>
