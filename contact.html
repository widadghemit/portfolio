<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact – Widad</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope&family=Montserrat:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #1f2039;
      color: white;
      font-family: 'Manrope', sans-serif;
      margin: 0;
    }

    .contact-section {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 80px 20px;
    }

    .contact-container {
      background-color: white;
      color: #1f2039;
      padding: 50px;
      border-radius: 15px;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
      max-width: 800px;
      width: 100%;
    }

    .contact-container h2,
    .contact-container p,
    .contact-container label {
      color: #1f2039;
    }

    .contact-container a {
      color: #a5b4fc;
      text-decoration: none;
    }

    .form-contact {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 20px;
    }

    .form-contact input,
    .form-contact textarea {
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 1rem;
      font-family: 'Manrope', sans-serif;
    }

    .cta {
      background-color: #a5b4fc;
      color: #1f2039;
      border: none;
      padding: 12px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    .cta:hover {
      background-color: #8b9de6;
    }

    .form-status {
      margin-top: 10px;
      font-weight: bold;
      color: #1f2039;
      animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    header nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background-color: #1f2039;
    }

    header nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 30px;
      background-color: #1f2039;
      color: white;
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <a href="index.html" class="lien-icone">
        <img src="Logo.png" alt="Logo Widad">
      </a>
      <div>
        <a href="index.html">Accueil</a>
        <a href="a-propos.html">À propos</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
  </header>

  <main class="contact-section">
    <section class="contact-container">
      <h2>Discutons ensemble</h2>
      <p>N'hésitez pas à me contacter pour une alternance, une collaboration ou toute autre opportunité !</p>

      <div class="contact-infos">
        <p><strong>Téléphone :</strong> <a href="tel:0651126440">06 51 12 64 40</a></p>
        <p><strong>Email :</strong> <a href="mailto:ghemit.widad@gmail.com">ghemit.widad@gmail.com</a></p>
        <p><strong>LinkedIn :</strong> <a href="https://www.linkedin.com/in/widadghemit" target="_blank">widadghemit</a></p>
      </div>

      <form id="contactForm" action="https://formspree.io/f/mnnvjynr" method="POST" class="form-contact">
        <label for="name">Nom :</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email :</label>
        <input type="email" id="email" name="email" required>

        <label for="subject">Objet :</label>
        <input type="text" id="subject" name="subject" required>

        <label for="message">Message :</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit" class="cta">Envoyer</button>
        <p id="formStatus" class="form-status"></p>
      </form>
    </section>
  </main>

  <footer>
    <p>© Widad – Tous droits réservés</p>
  </footer>

  <script>
    const form = document.getElementById('contactForm');
    const status = document.getElementById('formStatus');

    form.addEventListener('submit', async function(event) {
      event.preventDefault();
      status.textContent = 'Envoi en cours...';

      const formData = new FormData(form);
      const response = await fetch(form.action, {
        method: 'POST',
        body: formData,
        headers: {
          'Accept': 'application/json'
        }
      });

      if (response.ok) {
        status.textContent = 'Merci ! Votre message a bien été envoyé.';
        form.reset();
      } else {
        status.textContent = "Oups ! Une erreur s'est produite.";
      }
    });
  </script>

</body>
</html>
