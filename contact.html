<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact – Widad</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script>
      function showConfirmation(event) {
        event.preventDefault();

        const envelope = document.querySelector(".flying-envelope");
        const status = document.getElementById("status");

        envelope.classList.add("animate");

        setTimeout(() => {
          envelope.classList.remove("animate");
          status.classList.add("visible");
          status.innerText = "Votre message a bien été envoyé !";
        }, 1500);
      }
    </script>
  </head>
  <body>
     <header>
        <nav>
            <img src="Logo.png" alt="Logo Widad">
            <div>
                <a href="index.html">Accueil</a>
                <a href="a-propos.html">À propos</a>
                <a href="portfolio.html">Portfolio</a>
                <a href="contact.html">Contact</a>
            </div>
        </nav>
    </header>
    <main class="contact-section">
      <section>
        <h2>Envie de discuter ?</h2>
        <p>
          Je suis ravie d’échanger avec vous ! Que ce soit pour une opportunité,
          une collaboration ou simplement pour dire bonjour, n’hésitez pas à
          m’écrire.
        </p>

        <div class="contact-infos">
          <p>📞 06 51 12 64 40</p>
          <p>📧 <a href="mailto:ghemit.widad@gmail.com">ghemit.widad@gmail.com</a></p>
          <p>🔗 <a href="https://www.linkedin.com/in/widadghemit" target="_blank">Mon profil LinkedIn</a></p>
        </div>

        <form class="form-contact" onsubmit="showConfirmation(event)">
          <label for="nom">Nom</label>
          <input type="text" id="nom" name="nom" required />

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required></textarea>

          <button type="submit" class="cta">Envoyer</button>
          <div id="status"></div>
        </form>
        <div class="flying-envelope">✉️</div>
      </section>
    </main>

   <footer>
        <img src="Logo.png" alt="Logo Widad">
        <div>
            <a target="_blank" href="https://twitter.com/" class="lien-icone">
                <img src="twitter.png" alt="Logo Twitter">
            </a>
            <a target="_blank" href="https://www.instagram.com/" class="lien-icone">
                <img src="instagram.png" alt="Logo Instagram">
            </a>
        </div>
    </footer>
  </body>
</html>
